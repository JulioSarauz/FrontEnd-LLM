<div class="min-h-screen bg-[#07080f] flex flex-col justify-center items-center relative overflow-hidden font-sans py-10">
  <div class="absolute top-0 left-1/4 w-[500px] h-[500px] bg-[#00e5c0]/15 rounded-full blur-[120px] pointer-events-none"></div>
  <div class="absolute bottom-0 right-1/4 w-[400px] h-[400px] bg-[#5b6af0]/15 rounded-full blur-[100px] pointer-events-none"></div>
  
  <div class="w-full max-w-md bg-white/[0.02] border border-white/5 p-10 rounded-3xl backdrop-blur-xl shadow-2xl relative z-10 mt-8">
    
    <div *ngIf="errorMsg" class="mb-6 p-4 bg-[#ff5c7a]/10 border border-[#ff5c7a]/20 rounded-xl text-sm text-[#ff5c7a] text-center">
      {{ errorMsg }}
    </div>
    <div *ngIf="successMsg" class="mb-6 p-4 bg-[#00e5c0]/10 border border-[#00e5c0]/20 rounded-xl text-sm text-[#00e5c0] text-center font-medium">
      ✉️ {{ successMsg }}
    </div>

    <ng-container *ngIf="step === 1">
      <div class="text-center mb-8">
        <h2 class="text-2xl font-black text-white">Crear Cuenta</h2>
        <p class="text-sm text-white/40 mt-1">Únete a ResumeAnalyzer IA</p>
      </div>

      <form (ngSubmit)="onSubmit()" class="space-y-4">
        <div>
          <label class="block text-xs font-semibold text-white/60 uppercase tracking-wider mb-2">Nombres Completos</label>
          <input type="text" [(ngModel)]="userData.nombres" name="nombres" required class="w-full bg-[#0a0b16] border border-white/10 text-white rounded-xl px-4 py-3 focus:outline-none focus:border-[#5b6af0] transition-colors">
        </div>
        <div>
          <label class="block text-xs font-semibold text-white/60 uppercase tracking-wider mb-2">Correo Corporativo</label>
          <input type="email" [(ngModel)]="userData.email" name="email" required class="w-full bg-[#0a0b16] border border-white/10 text-white rounded-xl px-4 py-3 focus:outline-none focus:border-[#5b6af0] transition-colors">
        </div>
        <div>
          <label class="block text-xs font-semibold text-white/60 uppercase tracking-wider mb-2">Contraseña</label>
          <input type="password" [(ngModel)]="userData.password" name="password" required (input)="onPasswordInput()" class="w-full bg-[#0a0b16] border border-white/10 text-white rounded-xl px-4 py-3 focus:outline-none focus:border-[#5b6af0] transition-colors">
          
          <div class="mt-2.5" *ngIf="userData.password.length > 0">
            <div class="flex gap-1.5 h-1.5 mb-1.5">
              <div class="flex-1 rounded-full transition-colors duration-300" [ngClass]="passwordStrength >= 1 ? (passwordStrength === 4 ? 'bg-[#00e5c0]' : (passwordStrength >= 2 ? 'bg-[#fb923c]' : 'bg-[#ff5c7a]')) : 'bg-white/10'"></div>
              <div class="flex-1 rounded-full transition-colors duration-300" [ngClass]="passwordStrength >= 2 ? (passwordStrength === 4 ? 'bg-[#00e5c0]' : 'bg-[#fb923c]') : 'bg-white/10'"></div>
              <div class="flex-1 rounded-full transition-colors duration-300" [ngClass]="passwordStrength >= 3 ? (passwordStrength === 4 ? 'bg-[#00e5c0]' : 'bg-[#fb923c]') : 'bg-white/10'"></div>
              <div class="flex-1 rounded-full transition-colors duration-300" [ngClass]="passwordStrength >= 4 ? 'bg-[#00e5c0]' : 'bg-white/10'"></div>
            </div>
            <p class="text-[11px]" [ngClass]="passwordStrength === 4 ? 'text-[#00e5c0]' : 'text-white/40'">{{ passwordFeedback }}</p>
          </div>
        </div>
        <div>
          <label class="block text-xs font-semibold text-white/60 uppercase tracking-wider mb-2 mt-2">Repetir Contraseña</label>
          <input type="password" [(ngModel)]="confirmPassword" name="confirmPassword" required class="w-full bg-[#0a0b16] border border-white/10 text-white rounded-xl px-4 py-3 focus:outline-none focus:border-[#5b6af0] transition-colors" [ngClass]="{'border-[#ff5c7a]': confirmPassword && confirmPassword !== userData.password, 'border-[#00e5c0]': confirmPassword && confirmPassword === userData.password}">
        </div>

        <button type="submit" [disabled]="loading"
                class="w-full py-3.5 mt-6 bg-gradient-to-r from-[#00e5c0] to-[#5b6af0] text-white font-bold rounded-xl hover:opacity-90 transition-opacity shadow-[0_0_20px_rgba(0,229,192,0.2)] disabled:opacity-50 flex justify-center items-center gap-2">
          <svg *ngIf="loading" class="animate-spin h-5 w-5 text-white" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>
          {{ loading ? 'Enviando código...' : 'Registrarse' }}
        </button>
      </form>
      
      <div class="mt-8 text-center text-sm text-white/40">
        ¿Ya tienes cuenta? <a routerLink="/login" class="text-[#5b6af0] hover:text-[#7c8ff5] transition-colors font-semibold">Inicia Sesión</a>
      </div>
    </ng-container>

    <ng-container *ngIf="step === 2">
      <div class="text-center mb-8">
        <div class="w-16 h-16 bg-[#5b6af0]/20 rounded-full flex items-center justify-center mx-auto mb-4 border border-[#5b6af0]/40">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#5b6af0" stroke-width="2" stroke-linecap="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
        </div>
        <h2 class="text-2xl font-black text-white">Verifica tu correo</h2>
        <p class="text-sm text-white/40 mt-2">Hemos enviado un código a <strong>{{userData.email}}</strong></p>
      </div>

      <form (ngSubmit)="onVerifyOtp()" class="space-y-6">
        <div>
          <input type="text" [(ngModel)]="otpCode" name="otpCode" maxlength="6" required placeholder="000000"
                 class="w-full bg-[#0a0b16] border-2 border-white/10 text-white rounded-2xl px-4 py-4 text-center text-3xl font-black tracking-[0.5em] focus:outline-none focus:border-[#5b6af0] focus:ring-4 focus:ring-[#5b6af0]/20 transition-all placeholder-white/10">
        </div>

        <button type="submit" [disabled]="loading || otpCode.length !== 6"
                class="w-full py-4 bg-gradient-to-r from-[#00e5c0] to-[#5b6af0] text-white font-bold rounded-xl hover:opacity-90 transition-opacity shadow-[0_0_20px_rgba(0,229,192,0.2)] disabled:opacity-50 flex justify-center items-center gap-2">
          <svg *ngIf="loading" class="animate-spin h-5 w-5 text-white" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>
          {{ loading ? 'Verificando...' : 'Confirmar Código' }}
        </button>
      </form>
      
      <div class="mt-8 text-center">
        <button (click)="goBack()" class="text-sm text-white/40 hover:text-white transition-colors cursor-pointer flex items-center justify-center gap-1 mx-auto">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
          Cambiar correo electrónico
        </button>
      </div>
    </ng-container>

  </div>
</div>
