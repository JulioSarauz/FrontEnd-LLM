<div class="min-h-screen bg-[#07080f] flex flex-col justify-center items-center relative overflow-hidden font-sans py-10">
  <div class="absolute top-0 left-1/4 w-[500px] h-[500px] bg-[#00e5c0]/15 rounded-full blur-[120px] pointer-events-none"></div>
  <div class="absolute bottom-0 right-1/4 w-[400px] h-[400px] bg-[#5b6af0]/15 rounded-full blur-[100px] pointer-events-none"></div>
  <div class="absolute inset-0 opacity-20 pointer-events-none" style="background-image: linear-gradient(rgba(255,255,255,0.015) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.015) 1px,transparent 1px); background-size: 40px 40px;"></div>

  <div class="w-full max-w-md bg-white/[0.02] border border-white/5 p-10 rounded-3xl backdrop-blur-xl shadow-2xl relative z-10">
    <div class="text-center mb-8">
      <h2 class="text-2xl font-black text-white">Crear Cuenta</h2>
      <p class="text-sm text-white/40 mt-1">Únete a Botisfy AI Engine</p>
    </div>

    <div *ngIf="errorMsg" class="mb-6 p-4 bg-[#ff5c7a]/10 border border-[#ff5c7a]/20 rounded-xl text-sm text-[#ff5c7a] text-center">
      {{ errorMsg }}
    </div>

    <form (ngSubmit)="onSubmit()" class="space-y-5">
      <div>
        <label class="block text-xs font-semibold text-white/60 uppercase tracking-wider mb-2">Nombres Completos</label>
        <input type="text" [(ngModel)]="userData.nombres" name="nombres" required
               class="w-full bg-[#0a0b16] border border-white/10 text-white rounded-xl px-4 py-3 focus:outline-none focus:border-[#5b6af0] focus:ring-1 focus:ring-[#5b6af0] transition-colors">
      </div>
      <div>
        <label class="block text-xs font-semibold text-white/60 uppercase tracking-wider mb-2">Correo Corporativo</label>
        <input type="email" [(ngModel)]="userData.email" name="email" required
               class="w-full bg-[#0a0b16] border border-white/10 text-white rounded-xl px-4 py-3 focus:outline-none focus:border-[#5b6af0] focus:ring-1 focus:ring-[#5b6af0] transition-colors">
      </div>
      <div>
        <label class="block text-xs font-semibold text-white/60 uppercase tracking-wider mb-2">Contraseña</label>
        <input type="password" [(ngModel)]="userData.password" name="password" required
               class="w-full bg-[#0a0b16] border border-white/10 text-white rounded-xl px-4 py-3 focus:outline-none focus:border-[#5b6af0] focus:ring-1 focus:ring-[#5b6af0] transition-colors">
      </div>

      <button type="submit" [disabled]="loading"
              class="w-full py-3.5 mt-4 bg-gradient-to-r from-[#00e5c0] to-[#5b6af0] text-white font-bold rounded-xl hover:opacity-90 transition-opacity shadow-[0_0_20px_rgba(0,229,192,0.2)] disabled:opacity-50 flex justify-center items-center">
        <svg *ngIf="loading" class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>
        {{ loading ? 'Creando cuenta...' : 'Registrarse' }}
      </button>
    </form>
    
    <div class="mt-8 text-center text-sm text-white/40">
      ¿Ya tienes cuenta? <a routerLink="/login" class="text-[#5b6af0] hover:text-white transition-colors font-semibold">Inicia Sesión</a>
    </div>
  </div>
</div>
